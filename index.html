<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Заявка</title>
  <script src="https://telegram.org/js/telegram-web-app.js?61"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      background: #1e293b;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 16px;
    }

    input, textarea, button {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 12px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
    }

    input, textarea {
      background: #334155;
      color: white;
    }

    button {
      background: #3b82f6;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Оставить заявку</h1>

    <input id="name" type="text" placeholder="Ваше имя" />
    <input id="phone" type="text" placeholder="Ваш телефон" />
    <textarea id="comment" rows="5" placeholder="Комментарий"></textarea>

    <button id="sendBtn">Отправить заявку</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    document.getElementById("sendBtn").addEventListener("click", () => {
      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const comment = document.getElementById("comment").value.trim();

      if (!name || !phone || !comment) {
        alert("Заполните все поля");
        return;
      }

      const data = {
        name,
        phone,
        comment
      };

      tg.sendData(JSON.stringify(data));
      tg.close();
    });
  </script>
</body>
</html>
